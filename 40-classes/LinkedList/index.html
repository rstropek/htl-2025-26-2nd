<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linked List – Playlist</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 700px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        /* --- Visual chain ------------------------------------------------- */
        #playlist {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.4rem;
            margin: 1rem 0 2rem;
            padding: 1rem;
            background: #f5f5f5;
            border-radius: 6px;
            min-height: 3rem;
        }

        .node {
            background: #4a90d9;
            color: white;
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .null-node {
            background: #aaa;
            font-style: italic;
        }

        .arrow {
            font-size: 1.4rem;
            color: #555;
        }

        /* --- Forms --------------------------------------------------------- */
        section {
            margin-bottom: 1.5rem;
            padding: 1rem;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

        section h2 {
            margin-top: 0;
            font-size: 1rem;
        }

        label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        input, select {
            padding: 0.3rem 0.5rem;
            border: 1px solid #bbb;
            border-radius: 4px;
            font-size: 0.9rem;
            flex: 1;
        }

        button {
            margin-top: 0.5rem;
            padding: 0.4rem 1rem;
            border: none;
            border-radius: 4px;
            background: #4a90d9;
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
        }

        button:hover { background: #357abd; }
        button:disabled { background: #aaa; cursor: default; }

        #error-msg {
            display: none;
            color: #c0392b;
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <h1>My Playlist</h1>

    <!-- Visual linked-list display -->
    <div id="playlist"></div>

    <!-- Insert form -->
    <section id="insert-section">
        <h2>Add Song</h2>
        <label>Title: <input id="title-input" type="text" placeholder="Song title" /></label>
        <label>Artist: <input id="artist-input" type="text" placeholder="Artist name" /></label>
        <label>Insert after:
            <select id="after-select">
                <option value="">-- at beginning --</option>
            </select>
        </label>
        <button id="insert-btn">Insert</button>
        <p id="error-msg"></p>
    </section>

    <!-- Delete form -->
    <section id="delete-section">
        <h2>Remove Song</h2>
        <label>Song:
            <select id="delete-select"></select>
        </label>
        <button id="delete-btn">Delete</button>
    </section>

    <script src="./src/index.ts" type="module"></script>
</body>
</html>
